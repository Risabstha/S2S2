<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="src/assets/Favicon/favicon.ico"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />

    <meta name="description" content="Slippers2Sat-2 Official Website." />
    <title>Slippers2Sat-2</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #ebe9e3;
        color: #000000;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        function formatMs(ms) {
          return ms < 1000
            ? ms.toFixed(0) + " ms"
            : (ms / 1000).toFixed(2) + " s";
        }

        // Use performance.now() at window 'load' for robust total time since navigation start.
        function computeLoadTime() {
          try {
            var now =
              typeof performance !== "undefined" && performance.now
                ? performance.now()
                : 0;
            // Some browsers provide navigation entry duration; take the max to avoid zeros.
            var nav =
              (performance.getEntriesByType &&
                performance.getEntriesByType("navigation")) ||
              [];
            var duration = nav.length ? nav[0].duration : 0;
            return Math.max(now, duration);
          } catch (e) {
            return 0;
          }
        }

        function showBadge(text) {
          var el = document.createElement("div");
          el.textContent = "Page loaded in " + text;
          el.setAttribute("aria-live", "polite");
          el.style.position = "fixed";
          el.style.right = "12px";
          el.style.bottom = "12px";
          el.style.zIndex = "99999";
          el.style.background = "rgba(17, 24, 39, 0.85)";
          el.style.color = "#fff";
          el.style.fontFamily =
            "system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, Apple Color Emoji, Segoe UI Emoji";
          el.style.fontSize = "12px";
          el.style.padding = "8px 10px";
          el.style.borderRadius = "6px";
          el.style.boxShadow = "0 4px 14px rgba(0,0,0,0.2)";
          el.style.cursor = "pointer";
          el.title = "Click to dismiss";
          el.addEventListener("click", function () {
            el.remove();
          });
          document.body.appendChild(el);
          // Auto-hide after 6s
          setTimeout(function () {
            el.remove();
          }, 3000);
        }

        // Wait for the full load event; performance.now() will reflect total time
        window.addEventListener("load", function () {
          var ms = computeLoadTime();
          var formatted = formatMs(ms);
          // try {
          //   console.info('[Perf] Page loaded in', formatted, '(' + ms.toFixed(0) + ' ms)');
          // } catch (e) {}
          showBadge(formatted); // Show a small badge on the page (bottom-right)
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
